name: Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Run linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java and Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Check Kotlin formatting
        run: ./gradlew spotlessCheck

      - name: Check Android lint
        run: ./gradlew lintDebug

  test-jvm:
    name: Run JVM tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java and Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Run JVM tests
        run: >-
          ./gradlew
          :server:test
          :shared:jvmTest
          :shared:testDebugUnitTest
          :app:jvmTest
          :app:testDebugUnitTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-jvm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java and Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build Android debug APK
        run: ./gradlew :app:assembleDebug

  build-ios:
    name: Build iOS simulator app
    runs-on: macos-latest
    needs:
      - lint
      - test-jvm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java and Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build iOS simulator app
        run: >-
          xcodebuild build
          -project iosApp/iosApp.xcodeproj
          -configuration Debug
          -scheme iosApp
          -sdk iphonesimulator
          -derivedDataPath ./build
          -verbose
