ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = ["se.gustavkarlsson.chefgpt.ApplicationKt.module"]
    }
}

chefgpt {
    storage = "database" # or "memory"
    storage = ${?STORAGE}
    agent = "llm" # or "fake"
    agent = ${?AGENT}
    imageUploader = "cloudinary" # or "fake"
    imageUploader = ${?IMAGE_UPLOADER}
    anthropicApiKey = ${?ANTHROPIC_API_KEY}
    spoonacularApiKey = ${?SPOONACULAR_API_KEY}
    cloudinary {
        apiKey = ${?CLOUDINARY_API_KEY}
        apiSecret = ${?CLOUDINARY_API_SECRET}
        cloud = ${?CLOUDINARY_CLOUD}
    }
}

logging {
    calls {
        request {
            headers = false
        }
        response {
            headers = false
        }
    }
}

postgres {
    host = ${?POSTGRES_HOST}
    port = ${?POSTGRES_PORT}
    database = ${?POSTGRES_DATABASE}
    username = ${?POSTGRES_USERNAME}
    password = ${?POSTGRES_PASSWORD}
}

rethinkdb {
    host = ${?RETHINKDB_HOST}
    port = ${?RETHINKDB_PORT}
    database = ${?RETHINKDB_DB}
    username = ${?RETHINKDB_USERNAME}
    password = ${?RETHINKDB_PASSWORD}
}

include file("application_dev.conf")
